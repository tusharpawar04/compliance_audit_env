name: compliance-audit-env
version: 1.0.1
description: >
  A reinforcement learning environment for regulatory compliance auditing.
  AI agents act as compliance officers, identifying GDPR violations in company
  documents and suggesting compliant rewrites. Built on openenv-core framework.
author: Kiro AI
tasks:
  - easy
  - medium
  - hard
baseline_scores:
  easy: 0.70
  medium: 0.43
  hard: 0.22
graders:
  easy:
    enabled: true
    type: f1_score
    description: "F1 score for violation detection (precision and recall)"
  medium:
    enabled: true
    type: partial_credit
    description: "Exact match + category partial credit for violation detection"
  hard:
    enabled: true
    type: composite
    description: "60% detection score + 40% rewrite quality"
